      sortField: ""
      sortOrder: ""
      productId: "${product_id}"
      type: "2"
      commonStatus: 3
      buyOutQueryMy: "all"
      creatTime: null
      businessModel: ""
      zfbAuditState: ""
      updateTimeKssj: ""
      updateTimeJssj: ""
    expected_status: 200
    validate_data:
      - path: "$.responseType"
        operator: "=="
        value: "SUCCESS"
      - path: "$.businessSuccess"
        operator: "=="
        value: true
