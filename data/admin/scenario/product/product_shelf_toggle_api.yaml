    endpoint: "/hzsx/examineProduct/selectExaminePoroductList"
    json:
      auditState: ""
      businessModel: ""
      buyOutQueryMy: "all"
      categoryId: null
      channelGroupCode: "001"
      creatTime: null
      newAuditState: 1
      pageNumber: 1
      pageSize: 10
      shopName: "sass人人享租1"
      type: "2"
      sortField: ""
      sortOrder: ""

    expected_status: 200
    validate_data:
      - path: "$.responseType"
        operator: "=="
        value: "SUCCESS"
      - path: "$.businessSuccess"
        operator: "=="
