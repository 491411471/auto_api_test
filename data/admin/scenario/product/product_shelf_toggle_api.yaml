        value: null

  # 步骤3: 验证商品已上架（用 productId 精确查询已下架列表，不应包含该商品）
  - case_id: "ON_003"
    title: "验证商品已上架"
    description: "用 productId 精确查询已下架商品列表，验证该商品已不在下架列表中"
