# 运营端 - 商品管理：商品列表-编辑商品测试数据
# 覆盖场景：长租模式编辑商品、短租模式编辑商品
# 测试流程：查询商品 → 获取商品详情 → 修改商品信息

variables:
  channelGroupCode: "001"
  shopId: "71008738021cd3393bacbac182bd6a86af0b5c86af0b5c87"

# ==================== 长租模式 ====================
# 步骤1: 查询店铺商品-长租
step1_query_long_rental:
  case_id: "PE_001"
  step_id: "step1_query_long_rental"
  title: "查询店铺商品-长租"
  description: "查询长租模式(businessModel=1)已审核商品列表，获取最后一个商品的id"
  method: POST
  endpoint: "/hzsx/examineProduct/selectExaminePoroductList"
  json:
    pageNumber: 1
    pageSize: 10
    auditState: 2
    newAuditState: 2
    channelGroupCode: "001"
    sortField: ""
    sortOrder: ""
    shopName: "sass人人享租1"
    type: ""
    creatTime: null
    businessModel: "1"
    updateTimeKssj: ""
    updateTimeJssj: ""
  expected_status: 200
  validate_data:
    - path: "$.rpcResult"
      operator: "=="
      value: "SUCCESS"
    - path: "$.businessSuccess"
      operator: "=="
      value: true
    - path: "$.data.records"
      operator: "not_empty"

# 步骤2: 获取商品信息-长租
step2_get_product_detail_long:
  case_id: "PE_002"
  step_id: "step2_get_product_detail_long"
  title: "获取商品信息-长租"
  description: "根据步骤1获取的商品id，查询商品详情信息"
  method: GET
  endpoint: "/hzsx/product/selectProductEdit"
  params:
    id: "${product_id_long}"
  expected_status: 200
  validate_data:
    - path: "$.rpcResult"
      operator: "=="
      value: "SUCCESS"
    - path: "$.businessSuccess"
      operator: "=="
      value: true
    - path: "$.data.id"
      operator: "=="
      value: "${product_id_long}"

# 步骤3: 修改商品信息-长租
