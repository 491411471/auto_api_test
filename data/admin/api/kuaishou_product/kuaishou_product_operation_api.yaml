# ==================== 测试用例4: 复制快手商品 ====================
kuaishou_product_copy_tests:
  # 步骤1: 查询待复制的商品
  - case_id: "KPC_001"
    title: "查询待复制的快手商品"
    description: "查询快手商品列表，获取 product_id 和 name 用于复制"
    method: POST
    endpoint: "/hzsx/examineProduct/selectExaminePoroductList"
    json:
      pageNumber: 1
      pageSize: 10
      channelGroupCode: "001"
      productType: "kuaishou"
      productOfDouYin: null
      sortField: ""
      sortOrder: ""
      auditState: ""
      productName: ""
      productId: ""
      shopId: ""
      shopName: ""
      shopIds:
        - "71008738021cd3393bacbac182bd6a86af0b5c87"
      creatTime: null
      categoryId: null
    expected_status: 200
    validate_data:
      - path: "$.rpcResult"
        operator: "=="
        value: "SUCCESS"
      - path: "$.businessSuccess"
        operator: "=="
        value: true
      - path: "$.data.total"
        operator: ">="
        value: 1
    extract_vars:
      - var_name: "copy_product_id"
        path: "$.data.records[0].productId"
      - var_name: "copy_product_name"
        path: "$.data.records[0].name"

  # 步骤2: 复制快手商品
  - case_id: "KPC_002"
    title: "复制快手商品"
    description: "调用 busCopyTikTokProductForShop 接口复制快手商品到指定店铺"
    method: POST
    endpoint: "/hzsx/product/busCopyTikTokProductForShop"
    json:
      productId: "${copy_product_id}"
      shopIds:
        - "71008738021cd3393bacbac182bd6a86af0b5c87"
      copyProduct: true
    expected_status: 200
    validate_data:
      - path: "$.rpcResult"
        operator: "=="
        value: "SUCCESS"
      - path: "$.businessSuccess"
        operator: "=="
        value: true
      - path: "$.data.code"
        operator: "=="
        value: "200"
      - path: "$.data.msg"
        operator: "=="
        value: "复制成功"
      - path: "$.data.res"
        operator: "=="
        value: true

  # 步骤3: 审核通过复制后的商品
  - case_id: "KPC_003"
    title: "审核通过复制后的快手商品"
    description: "复制商品后，调用 examineProductConfirm 接口审核通过，id 通过 SQL 从 ct_product 动态获取"
    method: GET
    endpoint: "/hzsx/examineProduct/examineProductConfirm"
    sql:
      - query: >
          SELECT id AS _item_id, product_id
          FROM llxz_product.ct_product
          WHERE product_type = 'kuaishou'
          AND audit_state = '0'
          AND channel_group_code = '001'
          AND delete_time IS NULL
          AND name LIKE '${copy_product_name}%%'
          ORDER BY create_time DESC
          LIMIT 1
        column: _item_id
    params:
      auditState: 2
      id: "${_item_id}"
    expected_status: 200
    validate_data:
      - path: "$.rpcResult"
        operator: "=="
        value: "SUCCESS"
      - path: "$.businessSuccess"
        operator: "=="
        value: true
      - path: "$.data"
        operator: "=="
        value: true
