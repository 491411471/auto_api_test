# 运营端 - 商家管理 - 商家列表查询接口测试数据
# 接口：POST /hzsx/opeShop/toShopExamineListV2
# 场景：多条件查询商家列表（平台、店铺名称、店铺编码、续期状态、账户状态、注销状态、托管模式、清退状态、组合查询）

variables:
  channelGroupCode: "001"
  pageSize: 10
  pageNumber: 1

shop_list_query_tests:
  # ==================== 测试用例1：以平台为查询条件 ====================
  - case_id: "SLQ_001"
    title: "以平台为查询条件"
    description: "仅以 channelGroupCode=001 查询商家列表，验证接口常规响应"
    method: POST
    endpoint: "/hzsx/opeShop/toShopExamineListV2"
    expected_status: 200
    json:
      pageSize: 10
      pageNumber: 1
      experienceScoreSort: null
      channelGroupCode: "001"
      clearOutStatus: null
      createTimeStart: ""
      createTimeEnd: ""
      status: 2
      renewalDateStart: ""
      renewalDateEnd: ""
    min_count: 1
    validate_data:
      - path: "$.rpcResult"
        operator: "=="
        value: "SUCCESS"
      - path: "$.businessSuccess"
        operator: "=="
        value: true
      - path: "$.httpStatus"
        operator: "=="
        value: 200
      - path: "$.data.total"
        operator: ">="
        value: 1

  # ==================== 测试用例2：以店铺名称为查询条件 ====================
  - case_id: "SLQ_002"
    title: "以店铺名称为查询条件"
    description: "以 shopName=sass人人享租1 查询，验证 records 非空且所有 name 字段均等于查询条件"
    method: POST
    endpoint: "/hzsx/opeShop/toShopExamineListV2"
    expected_status: 200
    json:
      pageSize: 10
      pageNumber: 1
      experienceScoreSort: null
      channelGroupCode: "001"
      shopName: "sass人人享租1"
      clearOutStatus: null
      createTimeStart: ""
      createTimeEnd: ""
      status: 2
      renewalDateStart: ""
      renewalDateEnd: ""
    min_count: 1
    validate_data:
      - path: "$.rpcResult"
        operator: "=="
        value: "SUCCESS"
      - path: "$.businessSuccess"
        operator: "=="
        value: true
      - path: "data.records[*].name"
        operator: "all_eq"
        value: "sass人人享租1"

  # ==================== 测试用例3：以店铺编码为查询条件 ====================
  - case_id: "SLQ_003"
    title: "以店铺编码为查询条件"
    description: "以 shopId 查询，验证 records 非空且所有 shopId 字段均等于查询条件"
    method: POST
