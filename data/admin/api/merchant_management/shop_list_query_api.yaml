      pageSize: 10
      pageNumber: 1
      experienceScoreSort: null
      channelGroupCode: "001"
      shopName: ""
      shopId: "71008738021cd3393bacbac182bd6a86af0b5c87"
      clearOutStatus: null
      createTimeStart: ""
      createTimeEnd: ""
      status: 2
      renewalDateStart: ""
      renewalDateEnd: ""
