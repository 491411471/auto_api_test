# ---
# 运营端 - 售后管理 - 投诉统计查询接口测试数据
#
# 接口1：POST /hzsx/orderComplaints/queryComplaintStatisticsPage  (列表查询，用例1-9)
# 接口2：POST /hzsx/orderComplaints/getOrderComplaintsShopDetial (详情查询，用例10)
#
# 变量说明：
#   - 日期变量（由 Python 运行时注入）：
#       ${today_start}  今日 00:00:00
#       ${today_end}    今日 23:59:59
#       ${days_7_start}  近7日起始
#       ${days_30_start} 近30日起始
#       ${common_end}    通用结束时间（当天 23:59:59）

variables:
  channelGroupCode: "001"
  shop_id: "71008738021cd3393bacbac182bd6a86af0b5c87"

.common_endpoint: &common_endpoint
  method: POST
  endpoint: "/hzsx/orderComplaints/queryComplaintStatisticsPage"

complaint_statistics_query_tests:

  # ========== CSQ_001: 默认加载（近7日） ==========
  - case_id: "CSQ_001"
    title: "默认加载-近7日查询验证接口正常投诉单总数"
    description: "不输入任何筛选条件，使用近7日默认时间范围查询，验证接口正常投诉单总数返回及分页数据"
    <<: *common_endpoint
    json:
      pageSize: 10
      pageNum: 1
      categoryId: null
      orderStartNum: ""
      orderEndNum: ""
      channelGroupCode: "001"
      shopName: ""
      rentType: ""
      formShopCompOrderMagnitude: ""
      startDate: "${days_7_start}"
      endDate: "${common_end}"
      sortField: "completedOrderRateShow"
      sortOrder: "descend"
    extract_vars:
      - var_name: resp_completed_order_num
        path: "data.records[0].opeComplaintOrderNum"
      - var_name: resp_size
        path: "data.size"
      - var_name: resp_current
        path: "data.current"
    post_sql:
      - query: |
          SELECT COUNT(*) AS cnt
          FROM llxz_marketing.ct_order_complaints
          WHERE delete_time IS NULL
          AND create_time >= '${days_7_start}'
          AND create_time <= '${common_end}'
           AND channel in ('004', '005', '007', '008', '009', '011', '012', '082', '085')
        column: "cnt"
        expected_value: "${resp_completed_order_num}"
        operator: "=="
    expected_status: 200
    validate_data:
      # 第1层：基础响应
      - path: "$.rpcResult"
        operator: "=="
        value: "SUCCESS"
      - path: "$.businessSuccess"
        operator: "=="
        value: true
      - path: "$.data.size"
        operator: "=="
        value: 10
      - path: "$.data.current"
        operator: "=="
        value: 1
      # 第2层：结果结构（records 必须为列表）
      - path: "$.data.records"
        operator: "is_not_none"

