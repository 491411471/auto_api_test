    <<: *common_endpoint
    json:
      <<: *common_json
      status: "0"
      sourceType: null
    extract_vars:
      - var_name: resp_total
        path: data.orderComplaintsDtoPage.total
    post_sql:
      - query: |
          SELECT COUNT(*) AS cnt
          FROM llxz_marketing.ct_order_complaints
          WHERE channel IN ('005', '007', '008', '009', '011', '012', '082', '085') 
          AND status = 0 
          AND delete_time IS NULL;
        column: "cnt"
        expected_value: "${resp_total}"
        operator: "=="
    expected_status: 200
    validate_data:
      - path: "$.rpcResult"
        operator: "=="
        value: "SUCCESS"
      - path: "$.businessSuccess"
        operator: "=="
        value: true
      - path: "$.data.orderComplaintsDtoPage.total"
        operator: ">="
        value: 0
      - path: "$.data.orderComplaintsDtoPage.records[*].status"
        operator: "all_eq"
        value: 0

