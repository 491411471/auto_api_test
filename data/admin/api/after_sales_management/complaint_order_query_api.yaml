# ==================== 工单上报测试数据 ====================
add_off_order_complaint_tests:
  - case_id: "COQ_013"
    title: "工单上报"
    description: "SQL 预查询一条无投诉记录的订单，动态填充参数并调用工单上报接口"
    method: POST
    endpoint: "/hzsx/orderComplaints/addOffOrderComplaints"
    sql:
      query: |
        SELECT
        o.order_id,
        o.status,
        o.create_time,
        o.rent_start,
        o.unrent_time,
        o.shop_id AS order_shop_id,  -- 防止字段名冲突
        e.name,
        e.scene_label,
        e.order_label,
        e.business_model,
        e.shop_id AS complaint_shop_id, -- 防止字段名冲突
        e.channel
        FROM llxz_order.ct_user_orders o
         LEFT JOIN llxz_marketing.ct_order_complaints e
                   ON o.order_id = e.order_id
        WHERE o.shop_id = '71008738021cd3393bacbac182bd6a86af0b5c87'
        AND e.order_id IS NULL  -- 核心：过滤掉有关联投诉的订单
        LIMIT 1;
      columns: ["order_id", "shop_id", "channel", "source_type", "status"]
    json:
      orderId: "${order_id}"
      shopId: "${shop_id}"
      channel: "${channel}"
      sourceType: "${source_type}"
      complaintsCategoryOne: 17
      complaintsCategoryTwo: 22
      complaintsCategoryThird: 50
      typeId: 5
      complaintCreateTime: "${complaint_time}"
      telphone: "mm:16b7b1f8360af342790b8448ebc1c565a16a"
      complaintsType: 0
      complaintsChannel: 9
      content: "[自动化测试] 后端工单上报测试，此条数据由自动化测试脚本生成"
      images: ["https://oss.llxzu.com/78f3d4009839426589e9d199d52f5473.jpg"]
      status: "${status}"
      result: "[自动化测试] 后端工单处理结果，此条数据由自动化测试脚本生成"
      resultImages: []
    expected_status: 200
    validate_data:
      - path: "$.rpcResult"
        operator: "=="
        value: "SUCCESS"
      - path: "$.businessSuccess"
        operator: "=="
        value: true
      - path: "$.data"
        operator: "=="
        value: true
