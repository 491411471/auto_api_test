# 运营端 - 售后管理 - 投诉订单查询接口测试数据
variables:
  ChannelGroupId: "001"
  channelGroupCode: "001"

# ==================== 公共锚点（仅 mapping 可用 <<: 合并） ====================
.common_endpoint: &common_endpoint
  method: POST
  endpoint: "/hzsx/orderComplaints/queryOrderComplaintsPageNew"

.common_json: &common_json
  pageNumber: 1
  pageSize: 10
  ChannelGroupId: "001"
  shopName: null
  complaintsType: ""
  rentType: ""
  complaintCreateTime: null
  orderLabel: ""
  sceneLabel: ""
  channelGroupCode: "001"

# 注意：YAML <<: 合并键仅支持 mapping，sequence（列表）必须内联书写，
# 因此 extract_vars 和 validate_data 在每个用例中直接展开。

complaint_order_query_tests:
  # ========== 用例1：以商户条件查询(shopNamesass人人享租1) ==========
  - case_id: "COQ_001"
    title: "空值查询条件--投诉订单查询"
    description: "以空值为条件，验证接口正常返回，total 等于数据库记录数（SQL 独立验证）"
    <<: *common_endpoint
    json:
      <<: *common_json
      status: ""
      sourceType: ""
    extract_vars:
      - var_name: resp_total
        path: data.orderComplaintsDtoPage.total
    post_sql:
      - query: |
          SELECT COUNT(*) AS cnt
          FROM llxz_marketing.ct_order_complaints
          WHERE channel IN ('005', '007', '008', '009', '011', '012', '082', '085') 
          and delete_time IS NULL;
        column: "cnt"
        expected_value: "${resp_total}"
        operator: "=="
    expected_status: 200
    validate_data:
      - path: "$.rpcResult"
        operator: "=="
        value: "SUCCESS"
      - path: "$.businessSuccess"
        operator: "=="
        value: true
      - path: "$.data.orderComplaintsDtoPage.total"
        operator: ">="
        value: 0

  # ========== 用例2：以订单状态--待处理为查询条件 ==========
  - case_id: "COQ_002"
    title: "以订单状态--待处理为查询条件"
