          SELECT product_id, name FROM llxz_product.ct_product
          WHERE product_of_dou_yin = '1'
          AND delete_time IS NULL
          ORDER BY create_time DESC
          LIMIT 1
        columns:
          - product_id
          - name
    json:
      pageNumber: 1
      pageSize: 10
      channelGroupCode: "001"
      productOfDouYin: 1
      sortField: ""
      sortOrder: ""
      productName: ""
      productId: "${product_id}"
      shopId: ""
      shopName: ""
      creatTime: null
      categoryId: null
    expected_status: 200
    validate_data:
      - path: "$.rpcResult"
        operator: "=="
        value: "SUCCESS"
      - path: "$.businessSuccess"
        operator: "=="
        value: true
      - path: "$.data.records[*].productId"
        operator: "all_eq"
        value: "${product_id}"

  # ========== DQC_009: 产品新旧 - 全新 ==========
  - case_id: "DQC_009"
    title: "产品新旧-全新"
    description: "以产品新旧=全新(oldNewDegree=1)为查询条件，验证返回数据全部为全新"
    method: POST
