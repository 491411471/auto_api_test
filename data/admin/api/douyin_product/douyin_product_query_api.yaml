      sortField: ""
      sortOrder: ""
      productName: ""
      productId: ""
      shopId: ""
      shopName: ""
      oldNewDegree: 1
      creatTime: null
      categoryId: null
    expected_status: 200
    validate_data:
      - path: "$.rpcResult"
        operator: "=="
