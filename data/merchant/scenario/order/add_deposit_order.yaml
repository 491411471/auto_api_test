# 补押金业务流
flow_name: "补押金流程"
description: "查询符合条件的订单 → 补押金 → 查询补押金记录并验证金额和订单号"

# 补押金金额（可按需修改）
deposit_amount: 1

merchant:
  # 1. 查询符合条件的订单号（SQL）
  order_list:
    - 008OI202606042062459207292030976T

  # 2. 补押金接口
  add_deposit_order:
    endpoint: "/hzsx/business/order/addDepositOrder"
    method: POST
    body_template:
      orderId: "${order_id}"
      amount: "${deposit_amount}"
    expected_status: 200
    validate:
      - path: "$.businessSuccess"
        operator: "=="
        value: true
      - path: "$.rpcResult"
        operator: "=="
        value: "SUCCESS"
      - path: "$.httpStatus"
        operator: "=="
        value: 200
      - path: "$.errorMessage"
        operator: "is_none"
        value: null

  # 3. 查询补押金记录（用于验证）
  get_deposit_order_list:
    endpoint: "/hzsx/business/order/getDepositOrderList"
    method: POST
    body_template:
      pageNumber: 1
      pageSize: 10
      orderId: "${order_id}"
      shopId: "${shop_id}"
    expected_status: 200
    validate:
      - path: "$.businessSuccess"
        operator: "=="
        value: true
      - path: "$.data.records"
        operator: "not_empty"
        value: null
      # 注意：金额和订单号的详细断言在测试代码中完成（因为需要动态比对）
      # 此处仅确保记录存在，具体值验证在 test 脚本中通过循环或断言实现