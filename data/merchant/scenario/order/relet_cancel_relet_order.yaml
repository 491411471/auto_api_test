# 续租/取消续租完整流程测试
# 流程：查询账期详情 → 动态计算续租日期 → 执行续租 → 取消续租
# 接口1：/hzsx/business/order/queryOrderStagesDetail（查询账期详情）
# 接口2：/hzsx/business/order/extendOrderRelet（续租）
# 接口3：/hzsx/ope/order/cancelLeaseRenewal（取消续租）
# 创建时间：2026-06-04

variables:
  shop_id: "71008738021cd3393bacbac182bd6a86af0b5c87"
  # 待测试的订单号（可替换为其他可续租订单）
  order_id: "${test_order_id}"  # 引用全局测试订单号（集中定义于 config/settings.yaml）

merchant:

  # ==================== 步骤1：查询订单账期详情 ====================
  query_order_stages:
    endpoint: "/hzsx/business/order/queryOrderStagesDetail"
    method: POST
    body_template:
      orderId: "${order_id}"
    expected_status: 200
    validate:
      - path: "$.businessSuccess"
        operator: "=="
        value: true
      - path: "$.responseType"
        operator: "=="
        value: "SUCCESS"
      - path: "$.errorMessage"
        operator: "=="
        value: null

  # ==================== 步骤2：正常续租 ====================
  extend_order_relet:
    endpoint: "/hzsx/business/order/extendOrderRelet"
    method: POST
    body_template:
      orderId: "${order_id}"
      startDate: "${start_date}"
      endDate: "${end_date}"
      day: 1
    expected_status: 200
    validate:
      - path: "$.businessSuccess"
        operator: "=="
        value: true
      - path: "$.responseType"
        operator: "=="
        value: "SUCCESS"
      - path: "$.errorMessage"
        operator: "=="
        value: null
      - path: "$.data.isXuZuFlag"
        operator: "=="
        value: 1

  # ==================== 步骤3：取消续租 ====================
  cancel_lease_renewal:
    endpoint: "/hzsx/ope/order/cancelLeaseRenewal"
    method: POST
    body_template:
      orderId: "${order_id}"
      periodList:
        - "${relet_period}"
    expected_status: 200
    validate:
      - path: "$.businessSuccess"
        operator: "=="
        value: true
      - path: "$.responseType"
        operator: "=="
        value: "SUCCESS"
      - path: "$.errorMessage"
        operator: "=="
        value: null
      - path: "$.data"
        operator: "=="
        value: true
