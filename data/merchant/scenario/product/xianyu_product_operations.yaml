# 闲鱼商品操作测试数据
# 包含：上架、下架、修改商品

# ==================== 测试用例1：上架闲鱼商品 ====================

# 步骤1：查询已下架的闲鱼商品
xianyu_query_offline_product_test:
  - case_id: "XQO_001"
    title: "查询已下架的闲鱼商品"
    description: "查询type=2的已下架闲鱼商品列表"
    method: POST
    endpoint: "/hzsx/product/selectBusinessPrdouct"
    json:
      channelCatId: null
      type: "2"
      sortField: ""
      sortOrder: ""
      pageSize: 10
      pageNumber: 1
      channelGroupCode: "001"
      productType: "xianyu"
    expected_status: 200
    output_variables:
      - "product_id_from_list"  # 从records[9].productId提取

# 步骤2：上架闲鱼商品
xianyu_online_product_test:
  - case_id: "XON_001"
    title: "上架闲鱼商品"
    description: "将已下架的闲鱼商品上架，type=1"
    method: POST
    endpoint: "/hzsx/xianyu/product/updateProductInfo"
    json:
      productId: "${product_id}"
      type: 1
    expected_status: 200
    validate_data:
      - path: "$.rpcResult"
        operator: "=="
        value: "SUCCESS"
      - path: "$.businessSuccess"
        operator: "=="
        value: true
      - path: "$.data"
        operator: "=="
        value: true

# 步骤3：运营端审核上架商品（审核通过）
xianyu_audit_online_product_test:
  - case_id: "XAO_001"
    title: "审核上架闲鱼商品"
    description: "运营端审核上架商品，审核通过"
    method: POST
    endpoint: "/hzsx/xianyu/product/opeAuditProductPost"
    json:
      auditState: 2
      reason: null
      id: "${product_db_id}"
      configIdList: []
    expected_status: 200
    validate_data:
      - path: "$.rpcResult"
        operator: "=="
        value: "SUCCESS"
      - path: "$.businessSuccess"
        operator: "=="
        value: true
      - path: "$.data"
        operator: "=="
        value: true


