      - path: "$.data"
        operator: "is_not_none"
    extract_vars:
      - var_name: "draft_id"
        path: "$.data"

  # 步骤2: 查询草稿箱验证商品存在
  - case_id: "DPD_002"
    title: "查询草稿箱验证抖音商品"
    description: "使用 SQL 获取的 product_id 查询草稿箱，验证商品存在"
    method: POST
    endpoint: "/hzsx/product/selectBusinessPrdouct"
    json:
      pageSize: 10
      pageNumber: 1
      productId: "${product_id}"
      type: "5"
      productOfDouYin: 1
      channelGroupCode: "001"
    expected_status: 200
    validate_data:
      - path: "$.rpcResult"
        operator: "=="
        value: "SUCCESS"
      - path: "$.businessSuccess"
        operator: "=="
        value: true
      - path: "$.data.total"
        operator: ">="
        value: 1
      - path: "$.data.records[0].productId"
        operator: "=="
        value: "${product_id}"

