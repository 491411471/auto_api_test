  # 步骤2: 运营端审核快手商品
  - case_id: "KPI_002"
    title: "运营端审核快手商品"
    description: "商家端新增快手商品后，调用运营端 examineProductConfirm 接口审核通过，id 通过 SQL 从 ct_product 动态获取（使用 product_title 查询）"
    method: GET
    endpoint: "/hzsx/examineProduct/examineProductConfirm"
    sql:
      - query: >
          SELECT id AS _item_id FROM llxz_product.ct_product
          WHERE name = '${product_title}'
          AND product_type = 'kuaishou'
          AND delete_time IS NULL
          ORDER BY create_time DESC
          LIMIT 1
        column: _item_id
    params:
      auditState: 2
      id: "${_item_id}"
    expected_status: 200
    validate_data:
      - path: "$.rpcResult"
        operator: "=="
        value: "SUCCESS"
      - path: "$.businessSuccess"
        operator: "=="
        value: true
      - path: "$.data"
        operator: "=="
        value: true
