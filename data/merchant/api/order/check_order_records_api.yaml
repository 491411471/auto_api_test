variables:
  order_id: "008OI202605132054461722232184832T"
  shop_id: "71008738021cd3393bacbac182bd6a86af0b5c87"
  uid: "619bc3860e5563dcaf713299856586685040bbfccx7tadydd25z"

order_records_tests:
  - case_id: OR_001
    title: "验证成功下单数"
    description: "检查返回数据中的成功下单数（hisTransactionOrderCount）字段值"
    method: POST
    endpoint: "/hzsx/business/order/getAllOrderRecords"
    sql:
      query: |
        SELECT COUNT(*) AS success_order_count 
        FROM llxz_order.ct_user_orders 
        WHERE shop_id = '${shop_id}' 
        AND uid = '${uid}' 
        AND delete_time IS NULL 
        AND status IN ('05', '06', '09');
    json:
      orderId: ${order_id}
    expected_status: 200
    validate_data:
      - path: "$.responseType"
        operator: "=="
        value: "SUCCESS"
      - path: "$.businessSuccess"
        operator: "=="
        value: true
      - path: "$.data.hisTransactionOrderCount"
        operator: ">="
        value: ${success_order_count}
        type_check: "int"

