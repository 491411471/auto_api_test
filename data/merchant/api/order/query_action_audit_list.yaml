# data/api/order/query_action_audit_list.yaml
# 查询操作记录接口测试数据
# 接口：/hzsx/business/order/queryActionAuditListByOrderId
# 方法：GET
# 创建时间：2026-05-29
# 更新时间：2026-05-29

variables:
  shop_id: "71008738021cd3393bacbac182bd6a86af0b5c87"
  excluded_order_id: "008OI202606022061759565939113984T"  # 续租测试专用订单，需排除

# ========== 测试用例数据 ==========
query_action_audit_tests:
  # 用例1：正常查询 - 租用中订单
  - case_id: QAL_001
    title: "查询操作记录-正常参数-租用中订单"
    description: "查询租用中订单的操作记录，验证接口返回数据与数据库一致性"

    # 请求配置（execute_test_case标准格式）
    endpoint: "/hzsx/business/order/queryActionAuditListByOrderId"
    method: "GET"
    # SQL配置：查询租用中的订单ID
    sql:
      - query: |
          SELECT order_id 
          FROM llxz_order.ct_user_orders 
          WHERE status = '06' 
            AND shop_id = '${shop_id}'
            AND order_id != '${excluded_order_id}'
          LIMIT 1
        column: order_id
    params:
      orderId: "${order_id}"  # 从SQL结果自动注入
      operatorType: "SYS"
    # 期望响应
    expected_status: 200
    # 基础断言规则
    validate:
      - path: "$.responseType"
        operator: "=="
        value: "SUCCESS"
      - path: "$.data"
        operator: "is_not_none"
        value: null
      - path: "$.data"
        operator: "type"
        value: list
    # 后置SQL验证（框架标准功能）
    post_sql:
      - query: |
          SELECT * 
          FROM llxz_order.ct_action_audit 
          WHERE order_id='${order_id}' 
          ORDER BY create_time DESC
