# 投保订单查询接口测试数据
# 接口: POST /hzsx/ope/picc/queryLogPage

variables:
  shop_id: "71008738021cd3393bacbac182bd6a86af0b5c87"

.common_endpoint: &common_endpoint
  method: POST
  endpoint: "/hzsx/ope/picc/queryLogPage"

picc_query_tests:
  # ==================== 用例2: 以订单号为查询条件 ====================
  - case_id: PICC_002
    title: "以订单号为查询条件"
    description: "从无条件查询第一页records[0]获取orderId，再以此为条件查询，验证返回结果中orderId匹配"
    <<: *common_endpoint
    json:
      pageNumber: 1
      pageSize: 10
      orderId: "${order_id}"
    expected_status: 200
    validate_data:
      - path: "$.responseType"
        operator: "=="
        value: "SUCCESS"
      - path: "$.businessSuccess"
        operator: "=="
        value: true
      - path: "$.data.piccInsurenceLogDtoList.total"
        operator: ">="
        value: 1
      - path: "$.data.piccInsurenceLogDtoList.records[*].orderId"
        operator: "all_eq"
        value: "${order_id}"

  # ==================== 用例3: 以险种为查询条件-人保 ====================
  - case_id: PICC_003
    title: "以险种为查询条件-人保"
    description: "查询insuranceType=1(人保)的投保记录，验证返回结果中所有记录险种为1"
    <<: *common_endpoint
    json:
