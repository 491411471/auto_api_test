# data/api/order/rental_order_api.yaml
# 租后订单管理接口测试数据
# 接口：/hzsx/dcm/order/list（租后订单列表查询）
# 接口：/hzsx/sendSms/batchSendSms（批量发送短信）
# 接口：/hzsx/business/order/batch_assign_responsible_person（批量分配责任人）
# 创建时间：2026-05-25

.common_endpoint: &common_endpoint
  method: POST
  endpoint: "/hzsx/dcm/order/list"

.common_json: &common_json
  followTimeDesc: 0
  assignStatus: "0"
  pageNum: 1
  pageSize: 10
  tabName: "0"
  overdueTime: "0"
  overdueDaysDesc: 1

variables:
  shop_id: "71008738021cd3393bacbac182bd6a86af0b5c87"

rental_order_query_tests:
  # ==================== 正向用例 ====================

  - case_id: RO_001
    title: "租后订单-无条件查询（默认分页）"
    description: "不传任何筛选条件，查询租后订单列表，应返回分页数据"
    <<: *common_endpoint
    json:
      <<: *common_json
    expected_status: 200
    validate_data:
      - path: "$.responseType"
        operator: "=="
        value: "SUCCESS"
      - path: "$.businessSuccess"
        operator: "=="
        value: true
      - path: "$.errorMessage"
        operator: "=="
        value: null
      - path: "$.data.records"
        operator: "type"
        value: "list"
      - path: "$.data.total"
        operator: ">="
        value: 0

  - case_id: RO_002
    title: "租后订单-按订单编号精确查询"
    description: "使用第一个逾期待分配订单的订单号精确查询，验证返回唯一匹配记录"
    <<: *common_endpoint
    json:
      <<: *common_json
      assignStatus: ""
      orderId: "${first_order_id}"
    expected_status: 200
    validate_data:
      - path: "$.responseType"
        operator: "=="
        value: "SUCCESS"
      - path: "$.businessSuccess"
        operator: "=="
        value: true
      - path: "$.data.records[0].orderId"
        operator: "=="
        value: "${first_order_id}"
      - path: "$.data.total"
        operator: ">="
        value: 1

  - case_id: RO_003
    title: "租后订单-按不存在的订单号查询"
    description: "使用不存在的订单号，应返回空列表"
    <<: *common_endpoint
    json:
      <<: *common_json
      orderId: "008OI999999999999999999999999"
    expected_status: 200
    validate_data:
      - path: "$.responseType"
        operator: "=="
        value: "SUCCESS"
      - path: "$.data.records"
        operator: "=="
        value: []
      - path: "$.data.total"
        operator: "=="
        value: 0

  - case_id: RO_004
    title: "租后订单-按责任人查询"
    description: "使用第一个逾期待分配订单的责任人姓名筛选，验证返回结果非空"
    <<: *common_endpoint
    json:
      <<: *common_json
      assignStatus: ""
      responsibleName: "${first_responsible_name}"
    expected_status: 200
    validate_data:
      - path: "$.responseType"
        operator: "=="
        value: "SUCCESS"
      - path: "$.businessSuccess"
        operator: "=="
        value: true
      - path: "$.data.records"
        operator: "length_ge"
        value: 0

  - case_id: RO_005
    title: "租后订单-按逾期天数范围查询"
    description: "设置逾期天数最小值和最大值，验证返回结果的逾期天数均在范围内"
    <<: *common_endpoint
    json:
      <<: *common_json
      orderId: ""
      overdueDaysMin: 1
      overdueDaysMax: 100
      responsibleName: ""
      tabName: "0"
    expected_status: 200
    validate_data:
      - path: "$.responseType"
        operator: "=="
        value: "SUCCESS"
      - path: "$.businessSuccess"
        operator: "=="
        value: true
      - path: "$.data.records"
        operator: "length_ge"
        value: 0

  - case_id: RO_006
    title: "租后订单-按渠道筛选"
    description: "按渠道条件筛选租后订单，验证返回结果渠道一致"
    <<: *common_endpoint
    json:
      <<: *common_json
      channelId: "008"
      orderId: ""
      tabName: "0"
      overdueDaysMax: null
      overdueDaysMin: null
    expected_status: 200
    validate_data:
      - path: "$.responseType"
        operator: "=="
        value: "SUCCESS"
      - path: "$.businessSuccess"
        operator: "=="
        value: true
      - path: "$.data.total"
        operator: ">="
        value: 0

  - case_id: RO_007
    title: "租后订单-按姓名查询"
    description: "使用第一个逾期待分配订单的用户姓名筛选，验证返回结果非空"
    <<: *common_endpoint
    json:
      <<: *common_json
      assignStatus: ""
      userName: "${first_user_name}"
      tabName: "0"
    expected_status: 200
    validate_data:
      - path: "$.responseType"
        operator: "=="
        value: "SUCCESS"
      - path: "$.businessSuccess"
        operator: "=="
        value: true
      - path: "$.data.records"
        operator: "length_gt"
        value: 0

  # ==================== 组合查询 ====================
  - case_id: RO_008
    title: "租后订单-组合查询：责任人 + 渠道 + 逾期天数范围"
    description: "使用第一个逾期待分配订单的责任人和渠道，结合逾期天数范围进行组合查询"
    <<: *common_endpoint
    json:
      <<: *common_json
      assignStatus: ""
      responsibleName: "${first_responsible_name}"
      channelId: "${first_channel_id}"
      overdueDaysMin: 1
      overdueDaysMax: 50
    expected_status: 200
    validate_data:
      - path: "$.responseType"
        operator: "=="
        value: "SUCCESS"
      - path: "$.businessSuccess"
        operator: "=="
        value: true
      - path: "$.errorMessage"
        operator: "=="
        value: null
      - path: "$.data.total"
        operator: ">="
        value: 0

# ==================== 批量发送短信 ====================

rental_order_sms_tests:
  - case_id: ROS_001
    title: "租后订单-批量发送短信（正常）"
    description: "使用第一个逾期待分配订单，调用批量发送短信接口，验证成功"
    method: POST
    endpoint: "/hzsx/sendSms/batchSendSms"
    json:
      orderIdList:
        - "${first_order_id}"
      debtType: "0"
    expected_status: 200
    validate_data:
      - path: "$.responseType"
        operator: "=="
        value: "SUCCESS"
      - path: "$.businessSuccess"
        operator: "=="
        value: true
      - path: "$.errorMessage"
        operator: "=="
        value: null
      - path: "$.data.totalCount"
        operator: ">="
        value: 1
      - path: "$.data.results"
        operator: "type"
        value: "list"



  - case_id: ROS_002
    title: "租后订单-单条短信发送"
    description: "使用第一个逾期待分配订单的信息，验证单条短信发送成功"
    method: POST
    endpoint: "/hzsx/buyunSmsTemplate/sendDebtSmsTemplate"
    json:
      params:
        orderId: "${first_order_id}"
        userName: "${first_user_name}"
        day: "${first_overdue_days}"
      type: "0"
      telephone: ""
      channelId: "${first_channel_id}"
      sendCount: 0
      template: "${first_user_name}您好，您租赁的设备已经逾期 ${first_overdue_days}天，请尽快支付租金或者归还设备，依据租赁协议您已严重违约，已支付请忽略。"
    expected_status: 200
    validate_data:
      - path: "$.responseType"
        operator: "=="
        value: "SUCCESS"
      - path: "$.businessSuccess"
        operator: "=="
        value: true

# ==================== 批量分配责任人 ====================

rental_order_assign_tests:
  - case_id: ROA_001
    title: "租后订单-批量分配责任人（平均分配）"
    description: "将逾期订单批量分配给指定责任人，验证分配成功"
    method: POST
    endpoint: "/hzsx/dcm/order/assignOrder"
    sql:
      query: |
        SELECT cuo.order_id, cuo.user_name, cuo.channel_id,
               DATEDIFF(CURDATE(), cobs.statement_date) AS overdue_days,
               cbu.id AS backstage_user_id
        FROM llxz_order.ct_user_orders cuo
        INNER JOIN llxz_order.ct_order_by_stages cobs ON cobs.order_id = cuo.order_id
        LEFT JOIN llxz_user.ct_backstage_user cbu ON cuo.responsible_person_id = cbu.id
        WHERE cuo.shop_id = '71008738021cd3393bacbac182bd6a86af0b5c87'
          AND cuo.status IN ('06')
          AND cuo.is_violation = '04'
          AND (cuo.delete_time IS NULL OR cuo.delete_time <= '2001-01-01 00:00:00')
          AND cuo.user_name IS NOT NULL
          AND cobs.statement_date < CURDATE()
          AND cobs.status = 4              -- 账期状态为待还款
          AND cobs.shop_id = '71008738021cd3393bacbac182bd6a86af0b5c87'     -- 限制账期表的 shop_id
        ORDER BY cuo.create_time DESC
        LIMIT 2;
      columns: ["order_id", "user_name", "channel_id", "overdue_days", "backstage_user_id"]
      multiple: true
    custom_json: true
    expected_status: 200
    validate_data:
      - path: "$.responseType"
        operator: "=="
        value: "SUCCESS"
      - path: "$.businessSuccess"
        operator: "=="
        value: true
      - path: "$.errorMessage"
        operator: "=="
        value: null