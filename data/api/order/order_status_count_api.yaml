# 全局变量（公共配置）
variables:
  shop_id: "71008738021cd3393bacbac182bd6a86af0b5c87"

.common_endpoint: &common_endpoint
  method: GET
  endpoint: "/hzsx/business/order/countOrderStatus"

.common_params: &common_params
  requestSource: "businessNewOfListHeaderStatus"

order_status_tests:
  # ==================== 全部订单 ====================
  - case_id: OST_001
    title: "验证全部订单统计"
    description: "查询当前店铺所有订单数量，与接口返回的 status=00 的 total 比较"
    <<: *common_endpoint
    params:
      <<: *common_params
    sql:
      query: |
        SELECT COUNT(*) as total_count
        FROM llxz_order.ct_user_orders
        WHERE shop_id = '${shop_id}'
            AND channel_id IN ('004', '007', '008', '009', '011', '012', '085')
            AND rent_start IS NOT NULL
            AND (delete_time IS NULL OR delete_time <= '2001-01-01 00:00:00');
      column: "total_count"
    expected_status: 200
    validate_data:
      - path: "data[?(@.status=='00')].total"
        operator: "=="
        value: "${total_count}"

