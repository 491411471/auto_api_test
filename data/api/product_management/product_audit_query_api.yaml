variables:
  shop_id: "71008738021cd3393bacbac182bd6a86af0b5c87"
  # 全局固定参数
  channel_group_code: "001"
  page_size: 10
  page_number: 1
  # 用于详情查询的最新商品 id 和 itemId
  get_latest_product_sql: |
    SELECT id, product_id 
    FROM llxz_product.ct_product 
    ORDER BY create_time DESC 
    LIMIT 1
  # 用于修改上架：查询一个下架商品（type=2, status=1）


product_audit_tests:
  - case_id: "PA_001"
    title: "按审核状态查询商品"
    description: "auditState=0 查询待审核商品（1:审核拒绝；2：审核通过）"
    method: POST
    endpoint: "/hzsx/product/selectBusinessPrdouct"
    params: {}   # 请求体在 body 中
    json:
      pageSize: ${page_size}
      pageNumber: ${page_number}
      auditState: 0
      isDelete: false
      type: "1"
      sortField: ""
      sortOrder: ""
      channelGroupCode: ${channel_group_code}
    expected_status: 200
    validate_data:
      - path: "$.rpcResult"
        operator: "=="
        value: "SUCCESS"
      - path: "$.businessSuccess"
        operator: "=="
        value: true
      - path: "$.data.errorMessage"
        operator: "=="
        value: null
      - path: "$.data.total"
        operator: ">="
        value: 0

  - case_id: "PA_002"
    title: "按审核状态+商品状态查询"
    description: "auditState=0 且 productStatus=1"
    method: POST
    endpoint: "/hzsx/product/selectBusinessPrdouct"
    json:
      pageSize: ${page_size}
      pageNumber: ${page_number}
      auditState: 0
      isDelete: false
      productStatus: "1"
      type: "1"
      sortField: ""
      sortOrder: ""
      channelGroupCode: ${channel_group_code}
    expected_status: 200
    validate_data:
      - path: "$.rpcResult"
        operator: "=="
        value: "SUCCESS"
      - path: "$.businessSuccess"
        operator: "=="
        value: true
      - path: "$.data.errorMessage"
        operator: "=="
        value: null
      - path: "$.data.total"
        operator: ">="
        value: 0

  - case_id: "PA_003"
    title: "按商品编码查询"
    description: "使用 productId 精确查询"
    method: POST
    endpoint: "/hzsx/product/selectBusinessPrdouct"
    # 需要预先从数据库获取一个有效的 productId
    sql:
      - query: |
          SELECT product_id 
          FROM llxz_product.ct_product 
          WHERE product_id IS NOT NULL and status = 1 
          and audit_state  in (1,2)
          and shop_id ='${shop_id}'
          order by create_time desc
          LIMIT 1
        columns: [product_id]
    json:
      pageSize: ${page_size}
      pageNumber: ${page_number}
      productId: ${product_id}
      type: "1"
      sortField: ""
      sortOrder: ""
      channelGroupCode: ${channel_group_code}
    expected_status: 200
    validate_data:
      - path: "$.rpcResult"
        operator: "=="
        value: "SUCCESS"
      - path: "$.data.records[0].productId"
        operator: "=="
        value: ${product_id}

  - case_id: "PA_004"
    title: "按商品名称模糊查询"
    description: "productName 模糊匹配"
    method: POST
    endpoint: "/hzsx/product/selectBusinessPrdouct"
    sql:
      - query: |
          SELECT name 
          FROM llxz_product.ct_product 
          WHERE product_id IS NOT NULL and status = 1 
          and audit_state  in (1,2)
          and shop_id ='${shop_id}'
          order by create_time desc
          LIMIT 1
        columns: [name]
    json:
      pageSize: ${page_size}
      pageNumber: ${page_number}
      productName: ${name}
      productId: ""
      type: "1"
      sortField: ""
      sortOrder: ""
      channelGroupCode: ${channel_group_code}
    expected_status: 200
    validate_data:
      - path: "$.rpcResult"
        operator: "=="
        value: "SUCCESS"
      - path: "$.businessSuccess"
        operator: "=="
        value: true
      - path: "$.data.records[0].name"
        operator: "=="
        value: ${name}

  - case_id: "PA_005"
    title: "空查询条件"
    description: "所有搜索条件为空，返回默认列表"
    method: POST
    endpoint: "/hzsx/product/selectBusinessPrdouct"
    json:
      pageSize: ${page_size}
      pageNumber: ${page_number}
      productName: ""
      productId: ""
      type: "1"
      sortField: ""
      sortOrder: ""
      channelGroupCode: ${channel_group_code}
    expected_status: 200
    validate_data:
      - path: "$.rpcResult"
        operator: "=="
        value: "SUCCESS"
      - path: "$.data.total"
        operator: ">="
        value: 0
      - path: "$.data.errorMessage"
        operator: "=="
        value: null

  - case_id: "PA_006"
    title: "上架商品查询"
    description: "type=1 表示上架商品"
    method: POST
    endpoint: "/hzsx/product/selectBusinessPrdouct"
    json:
      pageSize: ${page_size}
      pageNumber: ${page_number}
      type: "1"
      sortField: ""
      sortOrder: ""
      channelGroupCode: ${channel_group_code}
    expected_status: 200
    validate_data:
      - path: "$.rpcResult"
        operator: "=="
        value: "SUCCESS"
      - path: "$.data.records"
        operator: "type"
        value: list
      - path: "$.data.errorMessage"
        operator: "=="
        value: null
      - path: "$.data.total"
        operator: ">="
        value: 0

  - case_id: "PA_007"
    title: "下架商品查询"
    description: "type=2 表示下架商品"
    method: POST
    endpoint: "/hzsx/product/selectBusinessPrdouct"
    json:
      pageSize: ${page_size}
      pageNumber: ${page_number}
      type: "2"
      sortField: ""
      sortOrder: ""
      channelGroupCode: ${channel_group_code}
    expected_status: 200
    validate_data:
      - path: "$.rpcResult"
        operator: "=="
        value: "SUCCESS"
      - path: "$.data.records[*].type"
        operator: "all_eq"
        value: 2

  - case_id: "PA_008"
    title: "查看商品审核日志详情"
    description: "获取最新商品的审核日志"
    method: POST
    endpoint: "/hzsx/product/selectExamineProductAuditLog"
    sql:
      - query: ${get_latest_product_sql}
        columns: [id, product_id]
    json:
      id: ${id}
      itemId: ${product_id}
      pageNumber: 1
      pageSize: 999
    expected_status: 200
    validate_data:
      - path: "$.rpcResult"
        operator: "=="
        value: "SUCCESS"
      - path: "$.businessSuccess"
        operator: "=="
        value: true
      - path: "$.data.records"
        operator: "type"
        value: list
      - path: "$.data.total"
        operator: ">="
        value: 0

  - case_id: "PU_001"
    title: "商品修改下架"
    method: POST
    endpoint: "/hzsx/product/updateProductInfo"
    sql:
      - query: |   # 用于修改下架：查询一个上架商品（type=1, status=1）
          SELECT product_id 
          FROM llxz_product.ct_product 
          WHERE product_id IS NOT NULL AND status = 1 AND type = 1
          ORDER BY create_time DESC
          LIMIT 1
        columns: [ product_id ]
    json:
      productId: ${product_id}
      type: 2
    expected_status: 200
    validate_data:
      - path: "$.businessSuccess"
        operator: "=="
        value: true
    post_sql:      # 后置 SQL：验证数据库中的 type 已变为 2
      - query: |
          SELECT type, status FROM llxz_product.ct_product WHERE product_id = '${product_id}'
        columns: [ type, status ]
        expected_value:
          type: 2
          status: 0
        operator: "=="

  - case_id: "PU_002"
    title: "商品修改上架"
    description: "将下架商品（type=2）修改为上架（type=1），并验证数据库type变为1"
    method: POST
    endpoint: "/hzsx/product/updateProductInfo"
    sql:
      - query: |
          SELECT product_id
          FROM llxz_product.ct_product
          WHERE product_id IS NOT NULL AND status = 0 AND type = 2
          ORDER BY create_time DESC
          LIMIT 1
        columns: [ product_id ]
    json:
      productId: ${product_id}
      type: 1
    expected_status: 200
    validate_data:
      - path: "$.businessSuccess"
        operator: "=="
        value: true
      - path: "$.data"
        operator: "=="
        value: true

    post_sql:     # 后置 SQL：验证数据库中的 type 已变为 1 status 变为 1
      - query: |
          SELECT type, status FROM llxz_product.ct_product WHERE product_id = '${product_id}'
        columns: [ type, status ]
        expected_value:
          type: 1
          status: 1
        operator: "=="
