[pytest]   # pytest 启动时会自动读取该配置
# 基础输出选项：-v 显示用例名和结果，-s 让 print 直接输出到控制台
# 注意：--alluredir 等重型选项由 run.py 统一管理，避免 PyCharm IDE 运行时生成大量报告文件
addopts = -v -s
# 测试目录：指定 pytest 扫描测试用例的根目录
testpaths = testcases
# 测试文件命名规则
python_files = test_*.py
# 测试类的命名规则
python_classes = Test*
# 测试函数的命名规则
python_functions = test_*
# 测试用例标签：可按类型筛选执行
markers =
    api: 单接口测试
    scenario: 业务流程测试
    smoke: 冒烟测试
    regression: 回归测试

# 将项目根目录加入 Python 路径，确保 common/utils/config 等模块可被正确导入
pythonpath = .