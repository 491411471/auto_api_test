# 当前激活的环境（可选值: test, prod）
active: "test"

# 当前激活的终端类型（可选值: merchant, admin）
active_endpoint: "merchant"

environments:
  # 测试环境
  test:
    shop_id: "71008738021cd3393bacbac182bd6a86af0b5c87"  # 商家端测试环境公用
    base_url: "https://test.llxzu.com"

    # 动态登录配置（auto_login=true 时自动调用登录接口获取 token，忽略下方硬编码 value）
    auto_login: true

    # 商家端配置
    merchant:
      login:
        mobile: "13811680671"
        smsLoginVerifyCode: "1"
        loginTimestamp: "34638162506202382"
        source: "SHOP"  # 商家端必须传 source
      auth_type: "api_token"
      auth_config:
        key: "token"
        value: "hqpl38f44oqyqwl2ubkjx6rc1vsu1u9o"  # auto_login=false 时使用的兑底 token
        xianyu_token: "txhos4hpuu7aqvzjm7x3cjijk74fe4di"
      timeout: 120
      max_retries: 3
      request_interval: 3  # 请求间隔时间（秒），防止触发"连续点击"限制
      xianyu_login:
        mobile: "13811680671"
        smsLoginVerifyCode: "1"
        loginTimestamp: "44638162506202789"
    
    # 运营端配置
    admin:
      login:
        mobile: "13811680671"
        smsLoginVerifyCode: "1"
        loginTimestamp: "84514182506202932"
        # 运营端登录不需要 source 字段
      auth_type: "api_token"
      auth_config:
        key: "token"
        value: "ypd1iboqgmuw0daue30y1jpnr1lr52m0"  # auto_login=false 时使用的兑底 token
      timeout: 120
      max_retries: 3
      request_interval: 3  # 请求间隔时间（秒），防止触发"连续点击"限制

  # 生产环境
  prod:
    base_url: "https://llxzu.com"   # 如生产环境 URL
    auto_login: false  # 生产环境暂不启用动态登录，使用下方硬编码 token
    merchant:
      auth_type: "api_token"
      auth_config:
        key: "token"
        value: "3ani4fxcoky1oy92825gg21wlu6qd2tz"
        xianyu_token: "请替换为真实的闲鱼店铺token"  # 生产环境闲鱼店铺token（需要单独获取）
      timeout: 10
      max_retries: 2
      request_interval: 1.5  # 请求间隔时间（秒），防止触发"连续点击"限制
    admin:
      auth_type: "api_token"
      auth_config:
        key: "token"
        value: "vvoupa4kz02622gx59cg2n35ossokien"
      timeout: 10
      max_retries: 2
      request_interval: 3  # 请求间隔时间（秒），防止触发"连续点击"限制